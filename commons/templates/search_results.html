
{% extends "commons.html" %}

{% block content %}
<h1>Search Results</h1>
<form method="get" action="{% url 'search' %}">
    {{ form.as_p }}
    <input type="submit" value="Search">
</form>
<ul>
    {% for result in results %}
        <li>{{ result.title }}</li>
    {% empty %}
        <li>No results found.</li>
    {% endfor %}
</ul>
{% endblock %}
